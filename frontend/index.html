<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="L-Goth Store — Moda Gótica Alternativa. Ropa, accesorios y calzado con diseños únicos para quienes abrazan la noche." />
  <meta name="theme-color" content="#06050a" />
  <meta name="color-scheme" content="dark" />
  <title>L-Goth Store — Moda Gótica Alternativa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cinzel+Decorative:wght@400;700;900&family=UnifrakturMaguntia&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cinzel+Decorative:wght@400;700;900&family=UnifrakturMaguntia&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </noscript>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <a href="#mainContent" class="skip-link">Saltar al contenido principal</a>

  <div class="particles-container" aria-hidden="true">
    <div class="particle particle-dot" style="left:3%;width:3px;height:3px;--delay:0s;--drift:20px"></div>
    <div class="particle particle-dot" style="left:12%;width:2px;height:2px;--delay:2.5s;--drift:-15px"></div>
    <div class="particle particle-dot" style="left:22%;width:4px;height:4px;--delay:5s;--drift:25px"></div>
    <div class="particle particle-cross" style="left:35%;--delay:1.5s;--drift:-20px">&#10013;</div>
    <div class="particle particle-dot" style="left:48%;width:3px;height:3px;--delay:3.5s;--drift:18px"></div>
    <div class="particle particle-diamond" style="left:58%;--delay:6s;--drift:-22px">&#9670;</div>
    <div class="particle particle-dot" style="left:68%;width:2px;height:2px;--delay:1s;--drift:15px"></div>
    <div class="particle particle-dot" style="left:78%;width:4px;height:4px;--delay:4.5s;--drift:-18px"></div>
    <div class="particle particle-cross" style="left:88%;--delay:7s;--drift:22px">&#10013;</div>
    <div class="particle particle-dot" style="left:95%;width:3px;height:3px;--delay:2s;--drift:-25px"></div>
  </div>

  <div class="grain-overlay" aria-hidden="true"></div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
